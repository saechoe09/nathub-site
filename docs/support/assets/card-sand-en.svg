<svg xmlns="http://www.w3.org/2000/svg" width="370" height="392" viewBox="0 0 370 392" role="img" aria-labelledby="title desc">
  <title id="title">Sand Traces</title>
  <desc id="desc">A dark experiment card showing curved sand ridges.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#2c2c2c"/>
      <stop offset="0.62" stop-color="#171717"/>
      <stop offset="1" stop-color="#101010"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="370" height="392" rx="34" fill="url(#bg)"/>
  <rect width="370" height="392" rx="34" fill="none" stroke="#ffffff" stroke-opacity=".05"/>
  <g transform="translate(185 93)">
    <circle r="152" fill="#232323"/>
    <circle r="152" fill="#ffffff" filter="url(#grain)" opacity=".7"/>
    <g fill="none" stroke-linecap="round">
      <path d="M-150 -8C-96 72 102 72 150 -8" stroke="#f3f3f3" stroke-opacity=".56" stroke-width="4"/>
      <path d="M-137 -34C-89 35 88 35 137 -34" stroke="#b9b9b9" stroke-opacity=".45" stroke-width="8"/>
      <path d="M-118 -58C-74 4 74 4 118 -58" stroke="#eeeeee" stroke-opacity=".46" stroke-width="6"/>
      <path d="M-96 -80C-58 -32 58 -32 96 -80" stroke="#b9b9b9" stroke-opacity=".42" stroke-width="8"/>
      <path d="M-72 -99C-42 -63 42 -63 72 -99" stroke="#eeeeee" stroke-opacity=".45" stroke-width="6"/>
      <path d="M-46 -114C-25 -91 25 -91 46 -114" stroke="#b7b7b7" stroke-opacity=".5" stroke-width="7"/>
      <path d="M-20 -126C-10 -118 10 -118 20 -126" stroke="#efefef" stroke-opacity=".48" stroke-width="5"/>
    </g>
  </g>
  <rect y="184" width="370" height="110" fill="url(#bg)" opacity=".92"/>
  <text x="185" y="319" fill="#f1f1f1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Sand Traces</text>
  <text x="185" y="343" fill="#9b9b9b" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12">Feel the passage of time in every line</text>
