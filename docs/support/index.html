<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NatHub support page. Contact: saechoe09@gmail.com.">
    <title>NatHub Support</title>
    <style>
      :root {
        color-scheme: dark;
        --text: rgba(255, 255, 255, 0.96);
        --muted: rgba(255, 255, 255, 0.42);
        --soft: rgba(255, 255, 255, 0.56);
        --page-max: 2206px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: #000;
      }

      body {
        min-height: 100svh;
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(ellipse at 50% 44%, rgba(255, 255, 255, 0.024), transparent 42%),
          linear-gradient(90deg, #151515 0%, #040404 26%, #000 100%);
        font-family: "PingFang HK", "PingFang SC", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        color: rgba(255, 255, 255, 0.82);
      }

      .page {
        position: relative;
        width: 100%;
        min-height: 100svh;
        overflow: hidden;
      }

      .brand-mark {
        position: absolute;
        top: clamp(28px, 2.45vw, 54px);
        left: clamp(28px, 3.05vw, 67px);
        width: clamp(39px, 2.9vw, 64px);
        aspect-ratio: 1;
      }

      .brand-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .hero {
        width: min(100%, var(--page-max));
        margin: 0 auto;
        padding-top: clamp(92px, 9.4vw, 207px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(52px, 4.53vw, 100px);
        font-weight: 650;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .subtitle {
        margin: clamp(8px, 0.77vw, 17px) 0 0;
        color: rgba(255, 255, 255, 0.94);
        font-size: clamp(17px, 1.36vw, 30px);
        font-weight: 400;
        line-height: 1.18;
      }

      .showcase {
        width: min(90.35vw, 1993px);
        margin: clamp(82px, 8.32vw, 184px) auto 0;
      }

      .desktop-strip {
        display: block;
        width: 100%;
        height: auto;
        user-select: none;
        -webkit-user-drag: none;
      }

      .mobile-stack {
        display: none;
      }

      footer {
        width: min(100%, var(--page-max));
        margin: clamp(78px, 5.88vw, 130px) auto 0;
        padding-bottom: clamp(42px, 3.68vw, 80px);
        text-align: center;
      }

      .legal {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        color: var(--muted);
        font-size: clamp(18px, 1.36vw, 30px);
        font-weight: 650;
        line-height: 1.18;
      }

      .copyright {
        margin: clamp(22px, 1.72vw, 38px) auto 0;
        color: rgba(255, 255, 255, 0.29);
        font-size: clamp(15px, 1.18vw, 26px);
        font-weight: 650;
        line-height: 1.23;
      }

      .support-copy {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      @media (min-width: 761px) {
        :root {
          --desktop-frame-width: clamp(1100px, 100vw, 1728px);
          --desktop-frame-height: max(820px, 100svh);
        }

        .page {
          height: var(--desktop-frame-height);
          min-height: 100svh;
        }

        .brand-mark {
          top: clamp(26px, calc(var(--desktop-frame-height) * 0.0325), 36px);
          left: clamp(42px, 4.22vw, 73px);
          width: clamp(34px, 2.5vw, 43px);
        }

        .hero {
          position: absolute;
          top: calc(var(--desktop-frame-height) * 0.1468);
          width: var(--desktop-frame-width);
          left: 50%;
          padding-top: 0;
          transform: translateX(-50%);
        }

        h1 {
          font-size: clamp(43px, 3.94vw, 68px);
          font-weight: 600;
        }

        .subtitle {
          margin-top: clamp(6px, calc(var(--desktop-frame-height) * 0.0107), 12px);
          font-size: clamp(13px, 1.16vw, 20px);
          font-weight: 600;
        }

        .showcase {
          position: absolute;
          top: calc(var(--desktop-frame-height) * 0.2972);
          left: 50%;
          width: clamp(927px, 84.26vw, 1456px);
          margin: 0 auto;
          transform: translateX(-50%);
        }

        footer {
          position: absolute;
          bottom: clamp(26px, calc(var(--desktop-frame-height) * 0.0403), 45px);
          left: 50%;
          width: var(--desktop-frame-width);
          margin-top: 0;
          padding-bottom: 0;
          transform: translateX(-50%);
        }

        .legal {
          font-size: clamp(13px, 1.04vw, 18px);
          font-weight: 600;
        }

        .copyright {
          margin-top: clamp(10px, calc(var(--desktop-frame-height) * 0.0143), 16px);
          font-size: clamp(8px, 0.58vw, 10px);
          font-weight: 600;
        }
      }

      @media (max-width: 760px) {
        body {
          background:
            radial-gradient(ellipse at 50% 16%, rgba(255, 255, 255, 0.028), transparent 40%),
            linear-gradient(90deg, #151515 0%, #050505 26%, #000 100%);
        }

        .page {
          min-height: 100svh;
          overflow: visible;
        }

        .brand-mark {
          top: 4.8vw;
          left: 4.2vw;
          width: 60px;
        }

        .hero {
          padding-top: min(28.7vw, 239px);
        }

        h1 {
          font-size: clamp(58px, 12vw, 100px);
        }

        .subtitle {
          margin-top: min(2vw, 17px);
          font-size: clamp(18px, 3.6vw, 30px);
        }

        .showcase {
          width: min(74.35vw, 620px);
          min-width: 300px;
          margin-top: min(15.2vw, 127px);
        }

        .desktop-strip {
          display: none;
        }

        .mobile-stack {
          display: block;
          width: 100%;
          height: auto;
          user-select: none;
          -webkit-user-drag: none;
        }

        footer {
          margin-top: min(10.5vw, 88px);
          padding-bottom: 18px;
        }

        .legal {
          font-size: 14px;
          font-weight: 400;
        }

        .copyright {
          width: min(96vw, 741px);
          margin-top: min(3.9vw, 32px);
          font-size: 14px;
          font-weight: 400;
        }

        .contact {
          display: block;
        }

        .copyright-line {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="brand-mark" href="mailto:saechoe09@gmail.com?subject=NatHub%20Support" aria-label="Email NatHub support">
        <img src="assets/union.png" width="78" height="79" alt="">
      </a>

      <section class="hero" aria-labelledby="title">
        <h1 id="title">NatHub</h1>
        <p class="subtitle">Interactive Nature Experiments</p>
      </section>

      <section class="showcase" aria-label="NatHub experiment previews">
        <img
          class="desktop-strip"
          src="assets/nathub-desktop-cards-updated.png"
          width="1456"
          height="543"
          alt="NatHub experiment previews with Foucault Pendulum, Magnetic, Light Refraction, Sand Traces, and Water Ripples cards."
        >

        <img
          class="mobile-stack"
          src="assets/nathub-mobile-stack-centered.png"
          width="620"
          height="2197"
          alt="NatHub mobile experiment preview with Magnetic, Water Ripples, and Sand Traces cards."
        >
      </section>

      <footer>
        <div class="legal">
          <a href="../release/public-pages/privacy-policy.html">Privacy Policy</a>
          <span>|</span>
          <a href="../release/public-pages/support.html">Support</a>
        </div>
        <p class="copyright">
          <span class="contact">Contact : <a href="mailto:saechoe09@gmail.com?subject=NatHub%20Support">saechoe09@gmail.com</a></span>
          <span class="copyright-line">Copyright 2026 sasa zhou. NatHub Support.</span>
        </p>
      </footer>

      <div class="support-copy">
        <p id="privacy">
          NatHub 1.0 does not require an account, collect personal data, use advertising,
          or include third-party analytics.
        </p>
      </div>
    </main>
  </body>
</html>
